<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inbox Webhook</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #081226;
      color: white;
      max-width: 480px;
      margin: auto;
    }

    .app {
      padding: 16px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #9db3d7;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .card {
      background: #0a1428;
      border: 1px solid #1d355a;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .hero {
      text-align: center;
    }

    .code-big {
      font-size: 46px;
      font-weight: bold;
      color: #7df7a2;
      margin: 10px 0;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .badge.netflix {
      background: #e50914;
      color: white;
    }

    .badge.default {
      background: #1f3a66;
      color: #9fc2ff;
    }

    .row {
      margin-bottom: 10px;
    }

    .label {
      font-size: 12px;
      color: #7f98bc;
      margin-bottom: 4px;
    }

    .value {
      font-size: 14px;
      word-break: break-all;
    }

    .icon {
      margin-right: 6px;
    }

    .message {
      background: #091427;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      white-space: pre-wrap;
      margin-top: 10px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #2b7cff;
      color: white;
      font-weight: bold;
    }

    .small {
      font-size: 12px;
      color: #7f98bc;
    }

    .debug {
      font-size: 11px;
      background: #020617;
      padding: 10px;
      border-radius: 10px;
      overflow: auto;
      border: 1px solid #223b63;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Inbox Webhook</h1>
    <div class="subtitle">Mensagens recebidas em tempo real</div>

    <div class="card hero">
      <div id="lastCode" class="code-big">-</div>
      <button onclick="copiarUltimo()">Copiar último código</button>
      <div id="lastTime" class="small"></div>
    </div>

    <div id="lista"></div>
  </div>

  <script>
    let emails = [];

    function detectarBadge(item) {
      const text = (
        item.subject + " " +
        item.message + " " +
        item.senderEmail
      ).toLowerCase();

      if (text.includes("netflix")) {
        return { name: "Netflix", class: "netflix" };
      }

      return { name: "Email", class: "default" };
    }

    function render() {
      const lista = document.getElementById("lista");

      if (!emails.length) {
        lista.innerHTML = "<div class='small'>nenhuma mensagem ainda</div>";
        return;
      }

      const ultimo = emails.find(e => e.code) || emails[0];
      document.getElementById("lastCode").innerText = ultimo.code || "-";
      document.getElementById("lastTime").innerText =
        new Date(ultimo.receivedAt).toLocaleString();

      lista.innerHTML = emails.map(item => {
        const badge = detectarBadge(item);

        return `
          <div class="card">

            <div class="badge ${badge.class}">
              ${badge.name}
            </div>

            <div class="row">
              <div class="label">📨 De</div>
              <div class="value">${item.senderEmail}</div>
            </div>

            <div class="row">
              <div class="label">📥 Recebido por</div>
              <div class="value">${item.recipientEmail || "-"}</div>
            </div>

            <div class="code-big">${item.code || "SEM CÓDIGO"}</div>

            <div class="message">${item.message}</div>

            <button onclick="copiar('${item.code || ""}')">
              Copiar código
            </button>

            <details>
              <summary class="small">DEBUG</summary>
              <div class="debug">
                ${JSON.stringify(item.debug, null, 2)}
              </div>
            </details>

          </div>
        `;
      }).join("");
    }

    async function carregar() {
      try {
        const res = await fetch("/api/webhook");
        const data = await res.json();
        emails = data.emails || [];
        render();
      } catch (e) {}
    }

    function copiar(code) {
      if (!code) return alert("sem código");
      navigator.clipboard.writeText(code);
      alert("copiado");
    }

    function copiarUltimo() {
      const ultimo = emails.find(e => e.code);
      if (!ultimo) return alert("sem código");
      copiar(ultimo.code);
    }

    setInterval(carregar, 3000);
    carregar();
  </script>
</body>
</html>
