<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

.container {
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card {
  background:#111c33;
  border-radius:15px;
  padding:15px;
  margin-top:10px;
}

.badge {
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
  display:inline-block;
  margin-bottom:10px;
}

.netflix { background:#e50914; }
.max { background:#2563eb; }
.globoplay { background:#005cde; }
.disney { background:#113ccf; } /* NOVO */
.default { background:#444; }

.code {
  font-size:40px;
  font-weight:bold;
  color:#7df7a2;
  text-align:center;
  margin:10px 0;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:bold;
}

details {
  margin-top:10px;
}

pre {
  background:black;
  padding:10px;
  font-size:11px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="container">
  <h2>Inbox Webhook</h2>
  <div id="content"></div>
</div>

<script>
let openState = { content:false, debug:false }

function detectarBadge(item){
  const text = (
    (item.subject||"") + " " +
    (item.message||"") + " " +
    (item.senderEmail||"")
  ).toLowerCase()

  if(text.includes("netflix")) return {name:"Netflix", class:"netflix"}
  if(text.includes("hbomax") || text.includes("max")) return {name:"Max", class:"max"}
  if(text.includes("globo")) return {name:"Globo Play", class:"globoplay"}

  // ⭐ NOVO DISNEY
  if(
    text.includes("disney") ||
    text.includes("disneyplus") ||
    text.includes("mail2.disneyplus.com")
  ){
    return {name:"Disney+", class:"disney"}
  }

  return {name:"Email", class:"default"}
}

function saveState(){
  const c = document.querySelector("#contentDetails")
  const d = document.querySelector("#debugDetails")

  openState = {
    content: c?.open || false,
    debug: d?.open || false
  }
}

function restoreState(){
  const c = document.querySelector("#contentDetails")
  const d = document.querySelector("#debugDetails")

  if(c) c.open = openState.content
  if(d) d.open = openState.debug
}

function render(email){
  if(!email){
    document.getElementById("content").innerHTML = "Nenhum email"
    return
  }

  const badge = detectarBadge(email)

  document.getElementById("content").innerHTML = `
  <div class="card">

    <div class="badge ${badge.class}">
      ${badge.name}
    </div>

    <div>📨 ${email.senderEmail || "desconhecido"}</div>
    <div>📥 ${email.recipientEmail || "não identificado"}</div>

    <div class="code">${email.code || "-"}</div>

    <button onclick="copiar('${email.code}')">
      Copiar código
    </button>

    <details id="contentDetails">
      <summary>Ver conteúdo</summary>
      <div>${email.message}</div>
    </details>

    <details id="debugDetails">
      <summary>Debug</summary>
      <pre>${JSON.stringify(email.debug,null,2)}</pre>
    </details>

  </div>
  `

  restoreState()
}

async function copiar(code){
  if(!code) return alert("Sem código")

  await navigator.clipboard.writeText(code)
  alert("Copiado!")
}

async function load(){
  try{
    saveState()

    const res = await fetch("/api/webhook")
    const data = await res.json()

    const email = data.emails?.[0] || null
    render(email)

  }catch(e){
    console.log(e)
  }
}

setInterval(load,3000)
load()
</script>

</body>
</html>
