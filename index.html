<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Códigos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #081226;
      color: white;
      max-width: 480px;
      margin: auto;
    }

    .app {
      padding: 16px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #2a4770;
      background: #0a1428;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #2b7cff;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .card {
      background: #0a1428;
      border: 1px solid #1d355a;
      border-radius: 16px;
      padding: 14px;
      margin-top: 14px;
    }

    .code {
      font-size: 32px;
      font-weight: bold;
      color: #7df7a2;
      margin: 10px 0;
    }

    .msg {
      font-size: 14px;
      color: #cfe0ff;
      white-space: pre-wrap;
    }

    .debug {
      margin-top: 10px;
      font-size: 11px;
      background: #020617;
      padding: 10px;
      border-radius: 10px;
      overflow: auto;
      border: 1px solid #223b63;
    }

    .small {
      font-size: 12px;
      color: #7f98bc;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="app">

    <h2>Receber código</h2>

    <input id="email" placeholder="seu@email.com" />
    <button onclick="entrar()">Entrar</button>

    <div id="status" class="small"></div>

    <div id="lista"></div>

  </div>

  <script>
    let currentEmail = localStorage.getItem("email") || "";

    if (currentEmail) {
      document.getElementById("email").value = currentEmail;
      carregar();
    }

    function entrar() {
      currentEmail = document.getElementById("email").value.toLowerCase().trim();

      if (!currentEmail) {
        alert("digita o email");
        return;
      }

      localStorage.setItem("email", currentEmail);
      carregar();
    }

    async function carregar() {
      document.getElementById("status").innerText = "carregando...";

      try {
        const res = await fetch("/api/webhook?email=" + currentEmail);
        const data = await res.json();

        const lista = document.getElementById("lista");

        if (!data.emails.length) {
          lista.innerHTML = "<div class='small'>nenhum codigo ainda</div>";
          return;
        }

        lista.innerHTML = data.emails.map(item => `
          <div class="card">
            <div><b>${item.email}</b></div>
            <div class="small">${new Date(item.receivedAt).toLocaleString()}</div>

            <div class="code">${item.code || "SEM CÓDIGO"}</div>

            <div class="msg">${item.message}</div>

            <button onclick="copiar('${item.code || ""}')">Copiar</button>

            <details style="margin-top:10px;">
              <summary>DEBUG</summary>
              <div class="debug">
                ${JSON.stringify(item.debug, null, 2)}
              </div>
            </details>
          </div>
        `).join("");

        document.getElementById("status").innerText =
          data.emails.length + " mensagens";

      } catch (e) {
        document.getElementById("status").innerText = "erro";
      }
    }

    function copiar(code) {
      if (!code) return alert("sem código");

      navigator.clipboard.writeText(code);
      alert("copiado");
    }

    setInterval(carregar, 3000);
  </script>
</body>
</html>
