<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Inbox Webhook</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #081226;
      --card: rgba(11, 23, 49, 0.96);
      --border: #1f3760;
      --text: #ffffff;
      --muted: #9cb4d8;
      --muted-2: #7390bc;
      --accent: #2f7cff;
      --success: #7df7a2;
      --code-bg: #08111f;
      --shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: linear-gradient(180deg, var(--bg) 0%, #0a1730 100%);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }

    body {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .app {
      padding: 16px;
      padding-bottom: 32px;
    }

    .top {
      margin-bottom: 16px;
    }

    .title {
      margin: 0 0 6px;
      font-size: 32px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .hero-card,
    .message-card,
    .status-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .status-card {
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .status-line {
      color: var(--muted);
      font-size: 14px;
    }

    .hero-card {
      padding: 18px;
      margin-bottom: 18px;
    }

    .hero-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .hero-code-wrap {
      background: linear-gradient(180deg, #09111f 0%, #07101d 100%);
      border: 1px solid #21406d;
      border-radius: 18px;
      padding: 18px 14px;
      text-align: center;
      margin-bottom: 12px;
    }

    .hero-code {
      font-size: 54px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--success);
      word-break: break-word;
    }

    .hero-time {
      font-size: 13px;
      color: var(--muted-2);
      text-align: center;
      margin-bottom: 12px;
    }

    .copy-main-btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      background: linear-gradient(180deg, #3c84ff 0%, var(--accent) 100%);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(47, 124, 255, 0.28);
    }

    .copy-main-btn:active {
      transform: scale(0.99);
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      color: #dfe9ff;
      margin: 0 0 12px;
    }

    .message-card {
      padding: 16px;
      margin-bottom: 14px;
    }

    .message-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .message-head-left {
      min-width: 0;
      flex: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.01em;
      margin-bottom: 10px;
    }

    .badge.netflix {
      background: #e50914;
      color: #fff;
      box-shadow: 0 8px 20px rgba(229, 9, 20, 0.25);
    }

    .badge.max {
      background: linear-gradient(180deg, #1f6fff 0%, #0d47d9 100%);
      color: #fff;
      box-shadow: 0 8px 20px rgba(31, 111, 255, 0.28);
    }

    .badge.default {
      background: #17345f;
      color: #b7d0ff;
    }

    .message-subject {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.4;
      color: #fff;
      word-break: break-word;
    }

    .message-time {
      flex-shrink: 0;
      font-size: 12px;
      color: var(--muted-2);
      white-space: nowrap;
      padding-top: 2px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .meta-card {
      background: #0d1c37;
      border: 1px solid #233f68;
      border-radius: 16px;
      padding: 12px;
    }

    .meta-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 800;
      color: #89a6d5;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .meta-icon {
      font-size: 14px;
      line-height: 1;
    }

    .meta-value {
      font-size: 14px;
      line-height: 1.55;
      color: #fff;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .code-box {
      background: linear-gradient(180deg, var(--code-bg) 0%, #060d19 100%);
      border: 1px solid #24416c;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .code-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .code-value {
      font-size: 38px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--success);
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .message-body {
      background: #091427;
      border: 1px solid #1b355b;
      border-radius: 16px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .message-body summary {
      cursor: pointer;
      list-style: none;
      padding: 14px;
      font-size: 12px;
      font-weight: 800;
      color: #93afda;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      user-select: none;
    }

    .message-body summary::-webkit-details-marker {
      display: none;
    }

    .message-body summary::after {
      content: "▼";
      float: right;
      font-size: 11px;
      opacity: 0.8;
      transform: translateY(1px);
    }

    .message-body[open] summary::after {
      content: "▲";
    }

    .message-content {
      padding: 0 14px 14px;
      color: #d8e4fb;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      border-top: 1px solid #1b355b;
      padding-top: 14px;
    }

    .copy-item-btn {
      width: 100%;
      border: 1px solid #284471;
      background: #112241;
      color: #d7e4ff;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .copy-item-btn:active {
      transform: scale(0.99);
    }

    details.debug-details {
      margin-top: 12px;
      background: #091427;
      border: 1px solid #173158;
      border-radius: 14px;
      padding: 12px;
    }

    details.debug-details summary {
      cursor: pointer;
      color: #9eb9e6;
      font-size: 13px;
      font-weight: 700;
      list-style: none;
    }

    details.debug-details summary::-webkit-details-marker {
      display: none;
    }

    details.debug-details summary::after {
      content: "▼";
      float: right;
      font-size: 11px;
      opacity: 0.8;
      transform: translateY(2px);
    }

    details.debug-details[open] summary::after {
      content: "▲";
    }

    pre {
      margin: 12px 0 0;
      padding: 12px;
      background: #040b15;
      border: 1px solid #1d385f;
      border-radius: 12px;
      color: #dce8ff;
      font-size: 11px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      max-height: 320px;
      overflow: auto;
    }

    .empty-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .footer-note {
      margin-top: 8px;
      text-align: center;
      color: #7088b3;
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 360px) {
      .title {
        font-size: 28px;
      }

      .hero-code {
        font-size: 46px;
      }

      .code-value {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1 class="title">Inbox Webhook</h1>
      <p class="subtitle">Mensagens recebidas em tempo real</p>
    </div>

    <div class="status-card">
      <div class="status-line" id="status">Carregando...</div>
    </div>

    <div class="hero-card">
      <div class="hero-label">Último código detectado</div>
      <div class="hero-code-wrap">
        <div class="hero-code" id="lastCode">-</div>
      </div>
      <div class="hero-time" id="lastTime">Nenhuma mensagem ainda</div>
      <button class="copy-main-btn" id="copyLastBtn">Copiar último código</button>
    </div>

    <div class="section-title">Mensagens recebidas</div>
    <div id="messagesList"></div>

    <div class="footer-note">
      Endpoint do webhook: <strong>/api/webhook</strong>
    </div>
  </div>

  <script>
    let emails = [];

    const statusEl = document.getElementById("status");
    const messagesListEl = document.getElementById("messagesList");
    const lastCodeEl = document.getElementById("lastCode");
    const lastTimeEl = document.getElementById("lastTime");
    const copyLastBtn = document.getElementById("copyLastBtn");

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString("pt-BR");
    }

    function detectarBadge(item) {
      const text = (
        (item.subject || "") + " " +
        (item.message || "") + " " +
        (item.senderEmail || "") + " " +
        (item.recipientEmail || "")
      ).toLowerCase();

      if (
        text.includes("netflix") ||
        text.includes("account.netflix.com")
      ) {
        return { name: "Netflix", className: "netflix" };
      }

      if (
        text.includes("hbomax") ||
        text.includes("hbo max") ||
        text.includes("alerts.hbomax.com") ||
        text.includes("max.com") ||
        text.includes("max ")
      ) {
        return { name: "Max", className: "max" };
      }

      return { name: "Email", className: "default" };
    }

    function renderMessages() {
      if (!emails.length) {
        lastCodeEl.textContent = "-";
        lastTimeEl.textContent = "Nenhuma mensagem ainda";
        messagesListEl.innerHTML = `
          <div class="empty-card">
            Ainda não chegou nenhuma mensagem no webhook.
          </div>
        `;
        return;
      }

      const latestWithCode = emails.find(item => item.code) || emails[0];
      lastCodeEl.textContent = latestWithCode.code || "SEM CÓDIGO";
      lastTimeEl.textContent = "Recebido em " + formatDate(latestWithCode.receivedAt);

      messagesListEl.innerHTML = emails.map(item => {
        const badge = detectarBadge(item);

        return `
          <div class="message-card">
            <div class="message-head">
              <div class="message-head-left">
                <div class="badge ${badge.className}">${escapeHtml(badge.name)}</div>
                <div class="message-subject">${escapeHtml(item.subject || "Nova mensagem recebida")}</div>
              </div>
              <div class="message-time">${escapeHtml(formatDate(item.receivedAt))}</div>
            </div>

            <div class="meta-grid">
              <div class="meta-card">
                <div class="meta-label">
                  <span class="meta-icon">📨</span>
                  <span>De</span>
                </div>
                <div class="meta-value">${escapeHtml(item.senderEmail || "desconhecido")}</div>
              </div>

              <div class="meta-card">
                <div class="meta-label">
                  <span class="meta-icon">📥</span>
                  <span>Recebido por</span>
                </div>
                <div class="meta-value">${escapeHtml(item.recipientEmail || "não identificado")}</div>
              </div>
            </div>

            <div class="code-box">
              <div class="code-label">Código detectado</div>
              <div class="code-value">${escapeHtml(item.code || "SEM CÓDIGO")}</div>
            </div>

            <details class="message-body">
              <summary>Ver conteúdo do email</summary>
              <div class="message-content">${escapeHtml(item.message || "")}</div>
            </details>

            <button class="copy-item-btn" data-code="${escapeHtml(item.code || "")}">
              Copiar esse código
            </button>

            <details class="debug-details">
              <summary>Ver debug completo</summary>
              <pre>${escapeHtml(JSON.stringify(item.debug, null, 2))}</pre>
            </details>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".copy-item-btn").forEach(button => {
        button.addEventListener("click", async () => {
          const code = button.getAttribute("data-code") || "";

          if (!code || code === "SEM CÓDIGO") {
            alert("Essa mensagem não tem código detectado.");
            return;
          }

          try {
            await navigator.clipboard.writeText(code);
            const oldText = button.textContent;
            button.textContent = "Copiado!";
            setTimeout(() => {
              button.textContent = oldText;
            }, 1200);
          } catch (err) {
            alert("Não consegui copiar.");
          }
        });
      });
    }

    async function loadMessages() {
      try {
        statusEl.textContent = "Atualizando...";
        const res = await fetch("/api/webhook");
        const data = await res.json();

        emails = Array.isArray(data.emails) ? data.emails : [];
        renderMessages();

        statusEl.textContent = emails.length
          ? `${emails.length} mensagem(ns) recebida(s)`
          : "Nenhuma mensagem recebida";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Erro ao carregar";
      }
    }

    copyLastBtn.addEventListener("click", async () => {
      const code = lastCodeEl.textContent || "";

      if (!code || code === "-" || code === "SEM CÓDIGO") {
        alert("Ainda não existe código para copiar.");
        return;
      }

      try {
        await navigator.clipboard.writeText(code);
        const oldText = copyLastBtn.textContent;
        copyLastBtn.textContent = "Copiado!";
        setTimeout(() => {
          copyLastBtn.textContent = oldText;
        }, 1200);
      } catch (err) {
        alert("Não consegui copiar.");
      }
    });

    loadMessages();
    setInterval(loadMessages, 3000);
  </script>
</body>
</html>
