<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>PJ Códigos</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #000000;
      --bg-gradient: radial-gradient(circle at top center, #260505 0%, #000000 70%);
      --card: rgba(15, 15, 15, 0.85);
      --border: #330b0b;
      --border-glow: #ff0000;
      --text: #ffffff;
      --muted: #a0a0a0;
      --muted-2: #777777;
      --accent: #e60000;
      --accent-hover: #ff1a1a;
      --success: #ff3333;
      --shadow: 0 8px 32px rgba(230, 0, 0, 0.15);
      --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg-gradient);
      background-color: var(--bg);
      background-attachment: fixed;
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    }

    body {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .hidden {
      display: none !important;
    }

    .app {
      padding: 16px;
      padding-bottom: 32px;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .title {
      margin: 0 0 6px;
      font-size: 34px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, #ffffff 0%, #ff8080 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .auth-screen,
    .hero-card,
    .message-card,
    .status-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .hero-card:hover,
    .message-card:hover {
      border-color: rgba(230, 0, 0, 0.4);
      box-shadow: var(--shadow);
    }

    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn 0.5s ease;
    }

    .auth-screen {
      width: 100%;
      padding: 26px 22px;
      position: relative;
      overflow: hidden;
    }

    .auth-screen::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .auth-title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 900;
    }

    .auth-subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .input {
      width: 100%;
      border: 1px solid #333;
      background: #050505;
      color: white;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
      transition: all 0.2s ease;
    }

    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(230, 0, 0, 0.15);
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 16px;
      background: linear-gradient(135deg, #e60000 0%, #990000 100%);
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(230, 0, 0, 0.3);
    }

    .btn:hover {
      box-shadow: 0 6px 20px rgba(230, 0, 0, 0.4);
    }

    .btn-secondary {
      background: #111111;
      border: 1px solid #333;
      color: #dddddd;
      margin-top: 10px;
      box-shadow: none;
    }

    .btn-secondary:hover {
      border-color: #555;
      color: #fff;
    }

    .auth-error {
      margin-top: 12px;
      color: #ff4d4d;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 600;
    }

    .status-card {
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .status-line {
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      text-align: center;
    }

    .hero-card {
      padding: 22px 18px;
      margin-bottom: 20px;
      position: relative;
    }

    .hero-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      text-align: center;
    }

    .hero-code-wrap {
      background: #000000;
      border: 1px solid #222;
      border-radius: 18px;
      padding: 24px 14px;
      text-align: center;
      margin-bottom: 14px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }

    .hero-code {
      font-size: 54px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--success);
      text-shadow: 0 0 20px rgba(255, 51, 51, 0.4);
      word-break: break-word;
    }

    .hero-time {
      font-size: 13px;
      color: var(--muted-2);
      text-align: center;
      margin-bottom: 16px;
    }

    .copy-main-btn,
    .copy-item-btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #e60000 0%, #990000 100%);
      color: white;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(230, 0, 0, 0.2);
    }

    .copy-item-btn {
      background: #111111;
      border: 1px solid #331111;
      color: #ffcccc;
      font-size: 14px;
      padding: 12px 14px;
      box-shadow: none;
    }
    
    .copy-item-btn:hover {
      background: #220505;
      border-color: #661a1a;
      color: #ffffff;
    }

    .copy-main-btn:active,
    .copy-item-btn:active,
    .btn:active {
      transform: scale(0.98);
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      color: #ffffff;
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      display: block;
      width: 4px;
      height: 16px;
      background: var(--accent);
      border-radius: 4px;
      box-shadow: 0 0 5px var(--accent);
    }

    .message-card {
      padding: 18px;
      margin-bottom: 16px;
    }

    .message-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .message-head-left {
      min-width: 0;
      flex: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.03em;
      margin-bottom: 10px;
      text-transform: uppercase;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    .badge.netflix {
      background: #e50914;
      color: #fff;
    }

    .badge.max {
      background: #111;
      color: #fff;
      border: 1px solid #333;
    }

    .badge.globoplay {
      background: #ff5500;
      color: #fff;
    }

    .badge.disney {
      background: #113ccf;
      color: #fff;
    }

    .badge.default {
      background: #222;
      color: #aaa;
      border: 1px solid #444;
    }

    .message-subject {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.4;
      color: #fff;
      word-break: break-word;
    }

    .message-time {
      flex-shrink: 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 2px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .meta-card {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid #222;
      border-radius: 12px;
      padding: 12px;
    }

    .meta-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .meta-value {
      font-size: 13px;
      line-height: 1.5;
      color: #ddd;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .code-box {
      background: rgba(0,0,0,0.6);
      border: 1px solid #330b0b;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    .code-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #ff6666;
      margin-bottom: 8px;
    }

    .code-value {
      font-size: 40px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 2px;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .message-body {
      background: #050505;
      border: 1px solid #222;
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    
    .message-body:hover, .debug-details:hover {
      border-color: #444;
    }

    .message-body summary,
    .debug-details summary {
      cursor: pointer;
      list-style: none;
      padding: 14px;
      font-size: 12px;
      font-weight: 800;
      color: #bbbbbb;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      user-select: none;
      outline: none;
    }

    .message-body summary::-webkit-details-marker,
    .debug-details summary::-webkit-details-marker {
      display: none;
    }

    .message-body summary::after,
    .debug-details summary::after {
      content: '▼';
      float: right;
      font-size: 10px;
      opacity: 0.6;
      transform: translateY(2px);
    }

    .message-body[open] summary::after,
    .debug-details[open] summary::after {
      content: '▲';
    }
    
    .message-body[open] summary,
    .debug-details[open] summary {
      border-bottom: 1px solid #222;
    }

    .message-content {
      padding: 14px;
      color: #cccccc;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .debug-details {
      margin-top: 12px;
      background: #050505;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 0;
      overflow: hidden;
    }

    pre {
      margin: 0;
      padding: 12px;
      background: #000000;
      color: #ff6666;
      font-size: 11px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      max-height: 320px;
      overflow: auto;
    }

    .empty-card {
      background: var(--card);
      border: 1px dashed #333;
      border-radius: 20px;
      padding: 32px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: #555;
      font-size: 12px;
      line-height: 1.5;
    }

    .password-box {
      margin-top: 16px;
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 14px;
      font-size: 13px;
      color: #888;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 360px) {
      .title { font-size: 28px; }
      .hero-code { font-size: 46px; }
      .code-value { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div id="authView" class="auth-wrap">
    <div class="auth-screen">
      <h1 class="auth-title">Acesso</h1>
      <p class="auth-subtitle">
        Digite a senha para abrir o painel.
      </p>

      <input
        id="passwordInput"
        class="input"
        type="password"
        placeholder="Digite a senha"
        autocomplete="off"
        spellcheck="false"
      />

      <button id="loginBtn" class="btn">Entrar</button>

      <div id="authError" class="auth-error"></div>

      <div class="password-box">
        A senha fica salva neste navegador até você sair.
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <div class="top">
      <h1 class="title">PJ Códigos</h1>
      <p class="subtitle">Mensagens recebidas em tempo real</p>
    </div>

    <div class="status-card">
      <div class="status-line" id="status">Carregando...</div>
    </div>

    <div class="status-card">
      <div class="status-line">Acesso liberado</div>
      <button id="logoutBtn" class="btn btn-secondary">Sair</button>
    </div>

    <div class="hero-card">
      <div class="hero-label">Último código detectado</div>
      <div class="hero-code-wrap">
        <div class="hero-code" id="lastCode">-</div>
      </div>
      <div class="hero-time" id="lastTime">Nenhuma mensagem ainda</div>
      <button class="copy-main-btn" id="copyLastBtn">Copiar último código</button>
    </div>

    <div class="section-title">Última mensagem recebida</div>
    <div id="messagesList"></div>

    <div class="footer-note">
      Endpoint do webhook: <strong>/api/webhook</strong>
    </div>
  </div>

  <script>
    const FIXED_PASSWORD = "Ae@1234Br";
    const STORAGE_AUTH = "webhook_fixed_password_auth_v1";

    let emails = [];
    let lastEmailsData = null;
    let openState = {
      contentOpen: false,
      debugOpen: false
    };

    const authView = document.getElementById("authView");
    const appView = document.getElementById("appView");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const authError = document.getElementById("authError");
    const logoutBtn = document.getElementById("logoutBtn");

    const statusEl = document.getElementById("status");
    const messagesListEl = document.getElementById("messagesList");
    const lastCodeEl = document.getElementById("lastCode");
    const lastTimeEl = document.getElementById("lastTime");
    const copyLastBtn = document.getElementById("copyLastBtn");

    function setLoggedIn(value) {
      localStorage.setItem(STORAGE_AUTH, value ? "true" : "false");
    }

    function isLoggedIn() {
      return localStorage.getItem(STORAGE_AUTH) === "true";
    }

    function login() {
      const password = passwordInput.value;
      authError.textContent = "";

      if (!password) {
        authError.textContent = "Digite a senha.";
        return;
      }

      if (password !== FIXED_PASSWORD) {
        authError.textContent = "Senha incorreta.";
        return;
      }

      setLoggedIn(true);
      passwordInput.value = "";
      showApp();
    }

    function showAuth() {
      authView.classList.remove("hidden");
      appView.classList.add("hidden");
      if (window.__pollInterval__) {
        clearInterval(window.__pollInterval__);
        window.__pollInterval__ = null;
      }
    }

    function showApp() {
      authView.classList.add("hidden");
      appView.classList.remove("hidden");

      loadMessages();

      if (!window.__pollInterval__) {
        window.__pollInterval__ = setInterval(() => {
          loadMessages();
        }, 3000);
      }
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString("pt-BR");
    }

    function detectarBadge(item) {
      const text = (
        (item.subject || "") + " " +
        (item.message || "") + " " +
        (item.senderEmail || "") + " " +
        (item.recipientEmail || "")
      ).toLowerCase();

      if (
        text.includes("netflix") ||
        text.includes("account.netflix.com")
      ) {
        return { name: "Netflix", className: "netflix" };
      }

      if (
        text.includes("hbomax") ||
        text.includes("hbo max") ||
        text.includes("alerts.hbomax.com") ||
        text.includes("max.com") ||
        text.includes(" max ")
      ) {
        return { name: "Max", className: "max" };
      }

      if (
        text.includes("conta globo") ||
        text.includes("globo play") ||
        text.includes("globoplay") ||
        text.includes("globo.com") ||
        text.includes("cadastro@globo.com")
      ) {
        return { name: "Globo Play", className: "globoplay" };
      }

      if (
        text.includes("disney+") ||
        text.includes("disneyplus") ||
        text.includes("mail2.disneyplus.com") ||
        text.includes("trx.mail2.disneyplus.com") ||
        text.includes("mydisney") ||
        text.includes("walt disney") ||
        text.includes("disney streaming") ||
        text.includes("disney")
      ) {
        return { name: "Disney+", className: "disney" };
      }

      return { name: "Email", className: "default" };
    }

    function saveOpenState() {
      const contentDetails = document.querySelector(".message-body");
      const debugDetails = document.querySelector(".debug-details");

      openState = {
        contentOpen: contentDetails ? contentDetails.open : false,
        debugOpen: debugDetails ? debugDetails.open : false
      };
    }

    function restoreOpenState() {
      const contentDetails = document.querySelector(".message-body");
      const debugDetails = document.querySelector(".debug-details");

      if (contentDetails) {
        contentDetails.open = openState.contentOpen;
        contentDetails.addEventListener("toggle", () => {
          openState.contentOpen = contentDetails.open;
        });
      }

      if (debugDetails) {
        debugDetails.open = openState.debugOpen;
        debugDetails.addEventListener("toggle", () => {
          openState.debugOpen = debugDetails.open;
        });
      }
    }

    function renderMessages() {
      if (!emails.length) {
        lastCodeEl.textContent = "-";
        lastTimeEl.textContent = "Nenhuma mensagem ainda";
        messagesListEl.innerHTML = `
          <div class="empty-card">
            Ainda não chegou nenhuma mensagem no webhook.
          </div>
        `;
        return;
      }

      const item = emails[0];
      const badge = detectarBadge(item);

      lastCodeEl.textContent = item.code || "SEM CÓDIGO";
      lastTimeEl.textContent = "Recebido em " + formatDate(item.receivedAt);

      messagesListEl.innerHTML = `
        <div class="message-card">
          <div class="message-head">
            <div class="message-head-left">
              <div class="badge ${badge.className}">${escapeHtml(badge.name)}</div>
              <div class="message-subject">${escapeHtml(item.subject || "Nova mensagem recebida")}</div>
            </div>
            <div class="message-time">${escapeHtml(formatDate(item.receivedAt))}</div>
          </div>

          <div class="meta-grid">
            <div class="meta-card">
              <div class="meta-label">📨 De</div>
              <div class="meta-value">${escapeHtml(item.senderEmail || "desconhecido")}</div>
            </div>

            <div class="meta-card">
              <div class="meta-label">📥 Recebido por</div>
              <div class="meta-value">${escapeHtml(item.recipientEmail || "não identificado")}</div>
            </div>
          </div>

          <div class="code-box">
            <div class="code-label">Código detectado</div>
            <div class="code-value">${escapeHtml(item.code || "SEM CÓDIGO")}</div>
          </div>

          <details class="message-body">
            <summary>Ver conteúdo do email</summary>
            <div class="message-content">${escapeHtml(item.message || "")}</div>
          </details>

          <button class="copy-item-btn" data-code="${escapeHtml(item.code || "")}">
            Copiar esse código
          </button>

          <details class="debug-details">
            <summary>Ver debug completo</summary>
            <pre>${escapeHtml(JSON.stringify(item.debug, null, 2))}</pre>
          </details>
        </div>
      `;

      const copyBtn = document.querySelector(".copy-item-btn");
      if (copyBtn) {
        copyBtn.addEventListener("click", async () => {
          const code = copyBtn.getAttribute("data-code") || "";

          if (!code || code === "SEM CÓDIGO") {
            alert("Essa mensagem não tem código detectado.");
            return;
          }

          try {
            await navigator.clipboard.writeText(code);
            const oldText = copyBtn.textContent;
            copyBtn.textContent = "Copiado!";
            setTimeout(() => {
              copyBtn.textContent = oldText;
            }, 1200);
          } catch {
            alert("Não consegui copiar.");
          }
        });
      }

      restoreOpenState();
    }

    async function loadMessages() {
      try {
        statusEl.textContent = "Atualizando...";
        const res = await fetch("/api/webhook");
        const data = await res.json();
        
        const emailsArray = Array.isArray(data.emails) ? data.emails : [];
        const currentDataStr = JSON.stringify(emailsArray);

        if (currentDataStr === lastEmailsData) {
          statusEl.textContent = emailsArray.length
            ? "1 mensagem recebida"
            : "Nenhuma mensagem recebida";
          return;
        }

        lastEmailsData = currentDataStr;
        saveOpenState();

        emails = emailsArray;
        renderMessages();

        statusEl.textContent = emails.length
          ? "1 mensagem recebida"
          : "Nenhuma mensagem recebida";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Erro ao carregar";
      }
    }

    loginBtn.addEventListener("click", login);

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        login();
      }
    });

    logoutBtn.addEventListener("click", () => {
      setLoggedIn(false);
      showAuth();
    });

    copyLastBtn.addEventListener("click", async () => {
      const code = lastCodeEl.textContent || "";

      if (!code || code === "-" || code === "SEM CÓDIGO") {
        alert("Ainda não existe código para copiar.");
        return;
      }

      try {
        await navigator.clipboard.writeText(code);
        const oldText = copyLastBtn.textContent;
        copyLastBtn.textContent = "Copiado!";
        setTimeout(() => {
          copyLastBtn.textContent = oldText;
        }, 1200);
      } catch {
        alert("Não consegui copiar.");
      }
    });

    if (isLoggedIn()) {
      showApp();
    } else {
      showAuth();
    }
  </script>
</body>
</html>
