<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Códigos por Email</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #07101f;
      color: #fff;
      font-family: Arial, sans-serif;
      min-height: 100%;
    }

    body {
      max-width: 480px;
      margin: 0 auto;
      background: linear-gradient(180deg, #081226 0%, #0a1730 100%);
      min-height: 100vh;
    }

    .app {
      padding: 16px;
      padding-bottom: 32px;
    }

    .top {
      padding-top: 8px;
      margin-bottom: 18px;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      line-height: 1.1;
      margin: 0 0 8px;
    }

    .subtitle {
      color: #9db3d7;
      font-size: 14px;
      line-height: 1.5;
      margin: 0;
    }

    .card {
      background: rgba(9, 20, 41, 0.95);
      border: 1px solid #1c355f;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .label {
      display: block;
      font-size: 14px;
      color: #a8bce0;
      margin-bottom: 10px;
    }

    .input {
      width: 100%;
      border: 1px solid #284573;
      background: #081224;
      color: #fff;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      outline: none;
    }

    .input:focus {
      border-color: #4c8dff;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
    }

    .btn-primary {
      background: #2b7cff;
      color: white;
    }

    .btn-secondary {
      background: #14284b;
      color: #cfe0ff;
      border: 1px solid #264268;
    }

    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #8ea7d1;
    }

    .hidden {
      display: none;
    }

    .hero-email {
      font-size: 14px;
      color: #94aed6;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .hero-code-box {
      background: #050d1a;
      border: 1px solid #24416a;
      border-radius: 18px;
      padding: 16px;
      margin-top: 14px;
    }

    .hero-code-label {
      color: #8ea8d1;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .hero-code {
      font-size: 42px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 3px;
      color: #79f2a4;
      word-break: break-word;
    }

    .hero-time {
      margin-top: 12px;
      color: #7d96bd;
      font-size: 13px;
    }

    .copy-btn {
      width: 100%;
      margin-top: 14px;
      border: 0;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: bold;
      background: #1e6ff0;
      color: #fff;
      cursor: pointer;
    }

    .section-title {
      font-size: 16px;
      font-weight: bold;
      margin: 2px 0 14px;
      color: #dce8ff;
    }

    .message-card {
      background: #091427;
      border: 1px solid #1d355a;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .message-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .message-subject {
      font-size: 14px;
      font-weight: bold;
      color: #fff;
    }

    .message-time {
      font-size: 12px;
      color: #7f99bf;
      white-space: nowrap;
    }

    .message-code {
      font-size: 28px;
      font-weight: bold;
      color: #7df7a2;
      letter-spacing: 2px;
      margin: 10px 0 12px;
      word-break: break-word;
    }

    .message-text {
      color: #d2def7;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .small-btn {
      width: 100%;
      margin-top: 12px;
      border: 1px solid #284471;
      background: #10203d;
      color: #d6e4ff;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .empty {
      text-align: center;
      color: #8da6ce;
      font-size: 15px;
      line-height: 1.6;
      padding: 26px 12px;
    }

    .footer-note {
      text-align: center;
      color: #718bb3;
      font-size: 12px;
      margin-top: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1 class="title">Receber código</h1>
      <p class="subtitle">
        Digite o email que vai receber o código. Só os códigos desse email vão aparecer aqui.
      </p>
    </div>

    <div class="card">
      <label class="label" for="emailInput">Qual o email?</label>
      <input
        id="emailInput"
        class="input"
        type="email"
        placeholder="exemplo@email.com"
        autocomplete="email"
        inputmode="email"
      />
      <button id="saveBtn" class="btn btn-primary">Entrar</button>
      <button id="changeBtn" class="btn btn-secondary hidden">Trocar email</button>
      <div id="status" class="status">Aguardando email...</div>
    </div>

    <div id="content" class="hidden">
      <div class="card">
        <div class="hero-email" id="currentEmail"></div>
        <div class="hero-code-box">
          <div class="hero-code-label">Último código recebido</div>
          <div class="hero-code" id="lastCode">-</div>
          <div class="hero-time" id="lastTime">Nenhum código ainda</div>
        </div>
        <button id="copyLastBtn" class="copy-btn">Copiar último código</button>
      </div>

      <div class="card">
        <div class="section-title">Mensagens</div>
        <div id="messagesList"></div>
      </div>
    </div>

    <div class="footer-note">
      Endpoint do webhook: <strong>/api/webhook</strong>
    </div>
  </div>

  <script>
    let selectedEmail = "";
    let emails = [];

    const emailInput = document.getElementById("emailInput");
    const saveBtn = document.getElementById("saveBtn");
    const changeBtn = document.getElementById("changeBtn");
    const statusEl = document.getElementById("status");
    const contentEl = document.getElementById("content");
    const currentEmailEl = document.getElementById("currentEmail");
    const lastCodeEl = document.getElementById("lastCode");
    const lastTimeEl = document.getElementById("lastTime");
    const messagesListEl = document.getElementById("messagesList");
    const copyLastBtn = document.getElementById("copyLastBtn");

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString("pt-BR");
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email).trim());
    }

    function setSelectedEmail(email) {
      selectedEmail = String(email).toLowerCase().trim();
      localStorage.setItem("selectedEmail", selectedEmail);

      currentEmailEl.innerHTML = "Email selecionado: <strong>" + escapeHtml(selectedEmail) + "</strong>";
      emailInput.value = selectedEmail;
      contentEl.classList.remove("hidden");
      changeBtn.classList.remove("hidden");
    }

    function clearSelectedEmail() {
      selectedEmail = "";
      localStorage.removeItem("selectedEmail");
      emails = [];
      emailInput.value = "";
      contentEl.classList.add("hidden");
      changeBtn.classList.add("hidden");
      statusEl.textContent = "Aguardando email...";
      messagesListEl.innerHTML = "";
      lastCodeEl.textContent = "-";
      lastTimeEl.textContent = "Nenhum código ainda";
      emailInput.focus();
    }

    function renderMessages() {
      if (!emails.length) {
        lastCodeEl.textContent = "-";
        lastTimeEl.textContent = "Nenhum código ainda";

        messagesListEl.innerHTML = `
          <div class="empty">
            Ainda não chegou nenhuma mensagem para esse email.
          </div>
        `;
        return;
      }

      const latestWithCode = emails.find(item => item.code) || emails[0];

      lastCodeEl.textContent = latestWithCode.code || "SEM CÓDIGO";
      lastTimeEl.textContent = "Recebido em " + formatDate(latestWithCode.receivedAt);

      messagesListEl.innerHTML = emails.map(item => `
        <div class="message-card">
          <div class="message-top">
            <div class="message-subject">${escapeHtml(item.subject || "Código recebido")}</div>
            <div class="message-time">${escapeHtml(formatDate(item.receivedAt))}</div>
          </div>
          <div class="message-code">${escapeHtml(item.code || "SEM CÓDIGO")}</div>
          <div class="message-text">${escapeHtml(item.message || "")}</div>
          <button class="small-btn" data-code="${escapeHtml(item.code || "")}">
            Copiar esse código
          </button>
        </div>
      `).join("");

      document.querySelectorAll(".small-btn").forEach(button => {
        button.addEventListener("click", async () => {
          const code = button.getAttribute("data-code") || "";

          if (!code || code === "SEM CÓDIGO") {
            alert("Essa mensagem não tem código detectado.");
            return;
          }

          try {
            await navigator.clipboard.writeText(code);
            const oldText = button.textContent;
            button.textContent = "Copiado!";
            setTimeout(() => {
              button.textContent = oldText;
            }, 1200);
          } catch (err) {
            alert("Não consegui copiar.");
          }
        });
      });
    }

    async function loadMessages() {
      if (!selectedEmail) return;

      try {
        statusEl.textContent = "Atualizando...";
        const res = await fetch("/api/webhook?email=" + encodeURIComponent(selectedEmail));
        const data = await res.json();

        emails = Array.isArray(data.emails) ? data.emails : [];
        renderMessages();

        statusEl.textContent = emails.length
          ? emails.length + " mensagem(ns) para esse email"
          : "Nenhuma mensagem encontrada";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Erro ao carregar";
      }
    }

    saveBtn.addEventListener("click", () => {
      const email = emailInput.value.trim();

      if (!validateEmail(email)) {
        alert("Digite um email válido.");
        return;
      }

      setSelectedEmail(email);
      loadMessages();
    });

    changeBtn.addEventListener("click", () => {
      clearSelectedEmail();
    });

    copyLastBtn.addEventListener("click", async () => {
      const code = lastCodeEl.textContent || "";

      if (!code || code === "-" || code === "SEM CÓDIGO") {
        alert("Ainda não existe código para copiar.");
        return;
      }

      try {
        await navigator.clipboard.writeText(code);
        const oldText = copyLastBtn.textContent;
        copyLastBtn.textContent = "Copiado!";
        setTimeout(() => {
          copyLastBtn.textContent = oldText;
        }, 1200);
      } catch (err) {
        alert("Não consegui copiar.");
      }
    });

    const savedEmail = localStorage.getItem("selectedEmail");
    if (savedEmail) {
      setSelectedEmail(savedEmail);
      loadMessages();
    }

    setInterval(loadMessages, 3000);
  </script>
</body>
</html>
